<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa Digital - 5000 Números</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        header h1 {
            color: #2c3e50;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        /* Painel de Estatísticas */
        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: #eef2f7;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.95rem;
        }

        .stat-box.disponivel { color: #2ecc71; }
        .stat-box.vendido { color: #e74c3c; }

        /* Barra de Busca rápida */
        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .search-container input {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-container input:focus {
            border-color: #3498db;
        }

        /* Grid de Números */
        .rifa-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
            gap: 8px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            max-height: 65vh;
            overflow-y: auto; /* Scroll interno para não travar a página */
        }

        /* Estilo de cada número (card) */
        .numero-card {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            background-color: #fdfdfd;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s ease;
            user-select: none;
            padding: 5px;
        }

        .numero-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Estado: Disponível */
        .numero-card.disponivel {
            color: #2c3e50;
            border-color: #bdc3c7;
        }

        /* Estado: Vendido */
        .numero-card.vendido {
            background-color: #e74c3c;
            color: #fff;
            border-color: #c0392b;
        }

        .numero-card .nome-comprador {
            font-size: 0.65rem;
            font-weight: normal;
            margin-top: 4px;
            text-align: center;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Responsividade */
        @media (max-width: 600px) {
            body { padding: 10px; }
            header h1 { font-size: 1.5rem; }
            .rifa-grid { grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Rifa Digital - Controler de Vendas</h1>
        <div class="stats">
            <div class="stat-box disponivel">Disponíveis: <span id="qtd-disponivel">5000</span></div>
            <div class="stat-box vendido">Vendidos: <span id="qtd-vendidos">0</span></div>
        </div>
    </header>

    <div class="search-container">
        <input type="number" id="busca" placeholder="Buscar número específico (ex: 1542)..." min="1" max="5000">
    </div>

    <div class="rifa-grid" id="grid"></div>

    <script>
        const TOTAL_NUMEROS = 5000;
        const grid = document.getElementById('grid');
        const buscaInput = document.getElementById('busca');
        const qtdDisponivelSpan = document.getElementById('qtd-disponivel');
        const qtdVendidosSpan = document.getElementById('qtd-vendidos');

        // Carrega dados salvos no navegador ou inicia um objeto vazio
        let rifaDados = JSON.parse(localStorage.getItem('rifa_5000_dados')) || {};

        // Formata o número com zeros à esquerda (ex: 0005, 0422, 4999)
        function formatarNumero(num) {
            return String(num).padStart(4, '0');
        }

        // Atualiza o painel de estatísticas no topo
        function atualizarEstatisticas() {
            const totalVendidos = Object.keys(rifaDados).length;
            const totalDisponiveis = TOTAL_NUMEROS - totalVendidos;
            
            qtdVendidosSpan.textContent = totalVendidos;
            qtdDisponivelSpan.textContent = totalDisponiveis;
        }

        // Renderiza/Gera os 5000 números de forma extremamente otimizada
        function renderizarRifa() {
            const fragment = document.createDocumentFragment();
            
            for (let i = 1; i <= TOTAL_NUMEROS; i++) {
                const numeroFormatado = formatarNumero(i);
                const card = document.createElement('div');
                card.className = 'numero-card';
                card.id = `num-${i}`;
                
                // Verifica se já está vendido
                if (rifaDados[i]) {
                    card.classList.add('vendido');
                    card.innerHTML = `
                        <span>${numeroFormatado}</span>
                        <span class="nome-comprador" title="${rifaDados[i]}">${rifaDados[i]}</span>
                    `;
                } else {
                    card.classList.add('disponivel');
                    card.innerHTML = `<span>${numeroFormatado}</span>`;
                }

                // Evento de clique para marcar/desmarcar
                card.addEventListener('click', () => gerenciarClique(i, numeroFormatado));
                
                fragment.appendChild(card);
            }
            
            grid.appendChild(fragment);
            atualizarEstatisticas();
        }

        // Lógica de marcação e confirmação
        function gerenciarClique(numero, formatado) {
            const jaVendido = rifaDados[numero];

            if (jaVendido) {
                // Caso já esteja marcado, permite desmarcar/liberar o número
                const confirmarLiberacao = confirm(`O número ${formatado} está marcado para "${jaVendido}". Deseja liberar este número e torná-lo disponível novamente?`);
                if (confirmarLiberacao) {
                    delete rifaDados[numero];
                    salvarEAtualizarInterface(numero, formatado, false);
                }
            } else {
                // Caso esteja livre, pergunta o nome do comprador
                const nome = prompt(`Digite o nome de quem está comprando o número ${formatado}:`);
                
                // Se o usuário digitou algo e não cancelou o prompt
                if (nome && nome.trim() !== "") {
                    const confirmarVenda = confirm(`Confirmar a venda do número ${formatado} para "${nome.trim()}"?`);
                    if (confirmarVenda) {
                        rifaDados[numero] = nome.trim();
                        salvarEAtualizarInterface(numero, formatado, true, nome.trim());
                    }
                } else if (nome === "") {
                    alert("Você precisa digitar um nome válido para marcar o número!");
                }
            }
        }

        // Atualiza o estado visual do botão clicado e salva no localStorage
        function salvarEAtualizarInterface(numero, formatado, isVendido, nome = "") {
            localStorage.setItem('rifa_5000_dados', JSON.stringify(rifaDados));
            const card = document.getElementById(`num-${numero}`);

            if (isVendido) {
                card.className = 'numero-card vendido';
                card.innerHTML = `
                    <span>${formatado}</span>
                    <span class="nome-comprador" title="${nome}">${nome}</span>
                `;
            } else {
                card.className = 'numero-card disponível';
                card.innerHTML = `<span>${formatado}</span>`;
            }
            atualizarEstatisticas();
        }

        // Sistema de busca e scroll suave até o número digitado
        buscaInput.addEventListener('input', (e) => {
            const buscaValor = parseInt(e.target.value);
            if (buscaValor >= 1 && buscaValor <= TOTAL_NUMEROS) {
                const elementoAlvo = document.getElementById(`num-${buscaValor}`);
                if (elementoAlvo) {
                    elementoAlvo.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // Destaque visual temporário piscando o elemento procurado
                    elementoAlvo.style.outline = '4px solid #3498db';
                    setTimeout(() => {
                        elementoAlvo.style.outline = 'none';
                    }, 2000);
                }
            }
        });

        // Inicializa a aplicação
        renderizarRifa();
    </script>
</body>
</html>

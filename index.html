<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado Direito de Família e Sucessões</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}
.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}
h1{
    text-align:center;
    color:#003366;
}
.questao{
    margin-bottom:25px;
    padding:15px;
    border-left:5px solid #003366;
    background:#fafafa;
}
.alternativa{
    margin:8px 0;
}
button{
    background:#003366;
    color:white;
    border:none;
    padding:15px 25px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
}
button:hover{
    background:#0055aa;
}
#resultado{
    margin-top:30px;
    font-size:24px;
    text-align:center;
    font-weight:bold;
}
.acerto{
    color:green;
}
.erro{
    color:red;
}
</style>
</head>
<body>
<div class="container">
<h1>Simulado - Direito de Família e Sucessões</h1>
<form id="quiz"></form>
<div style="text-align:center;">
<button onclick="corrigir()">Finalizar Simulado</button>
</div>
<div id="resultado"></div>
</div>
<script>

correta:1
},
{

correta:1
},
{

opcoes:["Menores emancipados","Menores sob guarda","Maiores relativamente incapazes","Nascituros"],
correta:2
},
{

opcoes:["Menores de 18 anos","Menores de 16 anos","Pródigos","Ébrios habituais"],

},
{

},
{

},
{

},

},
{

},
{

},
{

},
{

opcoes:["Leve","Administrativa","Extrema","Automática"],

},
{
pergunta:"15. A suspensão do poder familiar pode ser:",
opcoes:["Irreversível","Restituída","Automática","Perpétua"],
correta:1
},
{
pergunta:"16. O tutor administra:",
opcoes:["Somente a pessoa","Somente bens","Pessoa e bens do menor","Somente alimentos"],
correta:2
},
{
pergunta:"17. A curatela decorre normalmente de:",
opcoes:["Adoção","Casamento","Interdição","Divórcio"],

},
{
pergunta:"18. O testamento é ato:",
opcoes:["Bilateral","Personalíssimo","Oneroso","Conjunto"],

},

},

},
{

},
{

},
{

},

},

},
{
pergunta:"35. O STF equiparou sucessão do companheiro ao:",
opcoes:["Namoro","Casamento","Noivado","Parentesco"],

},
{

},

pergunta:"37. A revogação do testamento pode ser:",

},

pergunta:"42. Os testamentos simultâneo, recíproco e correspectivo são:",
opcoes:["Permitidos","Vedados","Obrigatórios","Especiais"],
correta:1
},
{
pergunta:"43. A tomada de decisão apoiada foi fortalecida pelo:",
opcoes:["ECA","EPD","CDC","CPP"],
correta:1
},
{
pergunta:"44. Pessoas com deficiência são consideradas:",
opcoes:["Absolutamente incapazes","Relativamente incapazes","Plenamente capazes","Sempre interditadas"],
correta:2
},
{
pergunta:"45. A guarda pode ser:",
opcoes:["Unilateral ou compartilhada","Somente compartilhada","Somente unilateral","Alternada obrigatória"],
correta:0
},
{
pergunta:"46. O tutor deve ser:",
opcoes:["Menor","Capaz","Parente obrigatório","Casado"],
correta:1
},
{
pergunta:"47. O menor de 17 anos pode testar?",
opcoes:["Não","Sim","Somente com autorização judicial","Somente casado"],
correta:1
},
{
pergunta:"48. O menor de 15 anos pode testar?",
opcoes:["Sim","Não","Somente assistido","Somente por escritura"],
correta:1
},
{
pergunta:"49. O poder familiar extingue-se pela:",
opcoes:["Maioridade","Emancipação","Morte","Todas as alternativas"],
correta:3
},
{
pergunta:"50. A principal finalidade da guarda é:",
opcoes:["Proteção da pessoa do filho","Gestão empresarial","Administração estatal","Cobrança de alimentos"],
correta:0
}
];
const quiz = document.getElementById("quiz");
questoes.forEach((q,i)=>{
let html = `
<div class="questao">
<p><strong>${q.pergunta}</strong></p>
`;
q.opcoes.forEach((op,j)=>{
html += `
<div class="alternativa">
<label>
<input type="radio" name="q${i}" value="${j}">
${op}
</label>
</div>`;
});
html += "</div>";
quiz.innerHTML += html;
});
function corrigir(){
let acertos=0;
questoes.forEach((q,i)=>{
let resposta=document.querySelector(`input[name="q${i}"]:checked`);
if(resposta && parseInt(resposta.value)===q.correta){
acertos++;
}
});
let porcentagem=((acertos/50)*100).toFixed(0);
document.getElementById("resultado").innerHTML=
`
<p>Você acertou ${acertos} de 50 questões.</p>
<p>Aproveitamento: ${porcentagem}%</p>
<button onclick="location.reload()">Refazer Simulado</button>
`;
window.scrollTo(0,document.body.scrollHeight);
}
</script>
</body>
</html>
